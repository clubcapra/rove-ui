<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #0f172a;
        }
        .poi-popup img {
            max-width: 200px;
            max-height: 150px;
            display: block;
            margin-top: 6px;
            border-radius: 4px;
        }
        .robot-cursor-wrap {
            display: flex; align-items: center; justify-content: center;
            transform-origin: center center;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    const map = L.map('map', { zoomControl: false }).setView([45.5048, -73.5773], 15);

    let currentTileLayer = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        { maxZoom: 19, attribution: '© Esri' }
    ).addTo(map);

    window.mapSetTileLayer = function(url, opts) {
        if (currentTileLayer) { map.removeLayer(currentTileLayer); }
        currentTileLayer = L.tileLayer(url, opts || { maxZoom: 19 }).addTo(map);
    };

    // --- Custom icon config (set via mapSetRobotIcon / mapSetPOIIcon) ---
    let _robotIconUrl = null;
    let _robotIconSize = [36, 36];
    let _poiIconUrl = null;
    let _poiIconSize = [24, 32];

    // --- Robot cursor ---
    let robotYaw = 0;

    function _robotIconHtml(yaw) {
        const [w, h] = _robotIconUrl ? _robotIconSize : [36, 36];
        const inner = _robotIconUrl
            ? '<img src="' + _robotIconUrl + '" style="width:' + w + 'px;height:' + h + 'px;display:block"/>'
            : '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="-18 -18 36 36">' +
              '<circle r="16" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>' +
              '<polygon points="0,-13 -8,7 8,7" fill="#22c55e" stroke="rgba(0,0,0,0.45)" stroke-width="1"/>' +
              '<circle r="3.5" fill="#ef4444"/>' +
              '</svg>';
        return '<div class="robot-cursor-wrap" style="transform:rotate(' + yaw + 'deg);width:' + w + 'px;height:' + h + 'px">' + inner + '</div>';
    }

    const robotIcon = L.divIcon({
        html: _robotIconHtml(0),
        iconSize: [36, 36],
        iconAnchor: [18, 18],
        className: ''
    });
    const robotMarker = L.marker([45.5048, -73.5773], { icon: robotIcon });
    let robotVisible = false;

    const pois = {};
    let poiCounter = 0;

    const PAN_PX = 100;

    // --- Navigation ---
    window.mapPanLeft  = function() { map.panBy([-PAN_PX, 0]); };
    window.mapPanRight = function() { map.panBy([ PAN_PX, 0]); };
    window.mapPanUp    = function() { map.panBy([0, -PAN_PX]); };
    window.mapPanDown  = function() { map.panBy([0,  PAN_PX]); };
    window.mapZoomIn   = function() { map.zoomIn(); };
    window.mapZoomOut  = function() { map.zoomOut(); };

    // --- View ---
    window.mapSetView = function(lat, lng, zoom) {
        map.setView([lat, lng], zoom !== undefined ? zoom : map.getZoom());
    };

    // --- Robot position ---
    window.mapSetRobotPosition = function(lat, lng) {
        robotMarker.setLatLng([lat, lng]);
        if (!robotVisible) {
            robotMarker.addTo(map);
            robotVisible = true;
        }
    };

    // --- Robot heading ---
    window.mapSetRobotYaw = function(yaw_deg) {
        robotYaw = yaw_deg;
        const el = robotMarker.getElement();
        if (el) {
            const wrap = el.querySelector('.robot-cursor-wrap');
            if (wrap) wrap.style.transform = 'rotate(' + yaw_deg + 'deg)';
        }
    };

    // --- Set custom robot icon (called from Python after map loads) ---
    window.mapSetRobotIcon = function(url, w, h) {
        _robotIconUrl = url;
        if (w && h) _robotIconSize = [w, h];
        const [iw, ih] = _robotIconSize;
        robotMarker.setIcon(L.divIcon({
            html: _robotIconHtml(robotYaw),
            iconSize: [iw, ih],
            iconAnchor: [iw / 2, ih / 2],
            className: ''
        }));
    };

    // --- Set custom POI icon (used for all future mapAddPOI calls) ---
    window.mapSetPOIIcon = function(url, w, h) {
        _poiIconUrl = url;
        if (w && h) _poiIconSize = [w, h];
    };

    // --- POI ---
    window.mapAddPOI = function(lat, lng, label) {
        const id = 'poi_' + (++poiCounter);
        const opts = {};
        if (_poiIconUrl) {
            const [iw, ih] = _poiIconSize;
            opts.icon = L.icon({
                iconUrl: _poiIconUrl,
                iconSize: [iw, ih],
                iconAnchor: [iw / 2, ih]
            });
        }
        const marker = L.marker([lat, lng], opts).addTo(map);
        const safeLabel = label || id;
        marker.bindPopup('<div class="poi-popup"><b>' + safeLabel + '</b><div id="photo_' + id + '"></div></div>');
        pois[id] = { marker: marker, label: safeLabel, photo: null };
        return id;
    };

    window.mapRemovePOI = function(id) {
        if (!pois[id]) return;
        map.removeLayer(pois[id].marker);
        delete pois[id];
    };

    window.mapAttachPhoto = function(id, dataUrl) {
        const poi = pois[id];
        if (!poi) return false;
        poi.photo = dataUrl;
        const img = dataUrl ? '<img src="' + dataUrl + '" />' : '';
        poi.marker.setPopupContent('<div class="poi-popup"><b>' + poi.label + '</b>' + img + '</div>');
        return true;
    };

    window.mapGetPOIs = function() {
        return Object.keys(pois).map(function(id) {
            const ll = pois[id].marker.getLatLng();
            return { id: id, lat: ll.lat, lng: ll.lng, label: pois[id].label, hasPhoto: !!pois[id].photo };
        });
    };
</script>
</body>
</html>
