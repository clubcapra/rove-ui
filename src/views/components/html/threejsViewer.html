<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Three.js Viewer</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1a1a2e;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #legend {
            position: absolute;
            left: 8px;
            right: 8px;
            bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            border-radius: 8px;
            background: rgba(8, 12, 28, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #f4f7ff;
            font: 12px/1.2 "Segoe UI", sans-serif;
            pointer-events: none;
            z-index: 10;
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 6px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
        }
        .legend-swatch {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        #edit-panel {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 260px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(8, 12, 28, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #f4f7ff;
            font: 12px/1.4 "Segoe UI", sans-serif;
            z-index: 20;
            user-select: none;
            pointer-events: auto;
        }
        #edit-panel.hidden {
            display: none;
        }
        .edit-title {
            font-weight: 600;
            margin-bottom: 6px;
        }
        .edit-sub {
            opacity: 0.85;
            margin-bottom: 8px;
        }
        #save-pivot-btn {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            padding: 6px 10px;
            background: #1f8f6b;
            color: #ffffff;
            font: inherit;
            cursor: pointer;
        }
        #save-pivot-btn:hover {
            background: #25a37b;
        }
    </style>
</head>
<body>
<div id="canvas-container"></div>
<div id="legend"></div>
<div id="edit-panel" class="hidden">
    <div class="edit-title">URDF Edit Mode</div>
    <div class="edit-sub" id="edit-selected">Selected: none</div>
    <div class="edit-sub">Controls: J/L (X), U/O (Y), I/K (Z), Shift for fine step</div>
    <button id="save-pivot-btn" type="button">Save</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';

    const container = document.getElementById('canvas-container');
    const legendContainer = document.getElementById('legend');
    const editPanel = document.getElementById('edit-panel');
    const editSelected = document.getElementById('edit-selected');
    const savePivotButton = document.getElementById('save-pivot-btn');

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // Camera
    const camera = new THREE.PerspectiveCamera(
        60, container.clientWidth / container.clientHeight, 0.1, 1000
    );
    camera.position.set(3, 3, 3);
    camera.lookAt(0, 0, 0);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.domElement.tabIndex = 0;
    container.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    const robotRoot = new THREE.Group();
    robotRoot.name = 'robot-root';
    scene.add(robotRoot);

    const anchorMarker = new THREE.Group();
    anchorMarker.visible = false;

    const anchorSphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.035, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xffcf33 })
    );
    anchorMarker.add(anchorSphere);

    const anchorAxes = new THREE.AxesHelper(0.22);
    anchorMarker.add(anchorAxes);
    scene.add(anchorMarker);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const PIVOT_STORAGE_KEY = 'threejsViewer:pivot-offsets';
    let selectedWrapper = null;
    let editModeEnabled = false;
    let pivotOffsets = {};

    const gltfLoader = new GLTFLoader();
    const objLoader = new OBJLoader();
    const stlLoader = new STLLoader();

    function disposeMaterial(material) {
        if (Array.isArray(material)) {
            material.forEach(disposeMaterial);
            return;
        }
        if (material && typeof material.dispose === 'function') {
            material.dispose();
        }
    }

    function disposeObject(root) {
        root.traverse((obj) => {
            if (!obj.isMesh) {
                return;
            }
            if (obj.geometry) {
                obj.geometry.dispose();
            }
            disposeMaterial(obj.material);
        });
    }

    function makeMaterial(options = {}, fallbackColor = 0x4a90d9) {
        return new THREE.MeshStandardMaterial({
            color: options.color ?? fallbackColor,
            flatShading: options.flatShading !== false,
        });
    }

    function restyleObject(root, options = {}) {
        root.traverse((obj) => {
            if (!obj.isMesh) {
                return;
            }
            const fallbackColor = obj.material?.color?.getHex?.() ?? 0x4a90d9;
            obj.material = makeMaterial(options, fallbackColor);
        });
    }

    function normalizeObject(wrapper, content, options = {}) {
        content.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(content);
        if (box.isEmpty()) {
            return;
        }

        const center = box.getCenter(new THREE.Vector3());
        const offset = new THREE.Vector3();

        if (options.center !== false) {
            offset.x = -center.x;
            offset.z = -center.z;
        }

        if (options.baseOnGround !== false) {
            offset.y = -box.min.y;
        } else if (options.centerY === true) {
            offset.y = -center.y;
        }

        content.position.add(offset);
        wrapper.updateMatrixWorld(true);
    }

    function degreesToRadians(degrees) {
        return degrees * Math.PI / 180;
    }

    function applyTransform(object3d, transform = {}, rotationUnit = 'degrees') {
        const position = transform.position ?? [0, 0, 0];
        let rotation = transform.rotation ?? [0, 0, 0];
        const scale = transform.scale ?? [1, 1, 1];

        if (rotationUnit.toLowerCase() === 'degrees') {
            rotation = [
                degreesToRadians(rotation[0] ?? 0),
                degreesToRadians(rotation[1] ?? 0),
                degreesToRadians(rotation[2] ?? 0)
            ];
        }

        object3d.position.set(position[0] ?? 0, position[1] ?? 0, position[2] ?? 0);
        object3d.rotation.set(rotation[0] ?? 0, rotation[1] ?? 0, rotation[2] ?? 0);

        if (Array.isArray(scale)) {
            object3d.scale.set(scale[0] ?? 1, scale[1] ?? 1, scale[2] ?? 1);
        } else {
            object3d.scale.setScalar(scale ?? 1);
        }
    }

    function removeObjectByName(name) {
        const existing = robotRoot.getObjectByName(name);
        if (!existing) {
            return;
        }
        robotRoot.remove(existing);
        disposeObject(existing);
    }

    function updateSelectedLabel() {
        if (!editSelected) {
            return;
        }
        editSelected.textContent = `Selected: ${selectedWrapper ? selectedWrapper.name : 'none'}`;
    }

    function setSelectedWrapper(wrapper) {
        selectedWrapper = wrapper;
        updateSelectedLabel();
        updateAnchorMarker();
    }

    function updateAnchorMarker() {
        if (!editModeEnabled || !selectedWrapper) {
            anchorMarker.visible = false;
            return;
        }

        selectedWrapper.updateMatrixWorld(true);
        const worldPos = new THREE.Vector3();
        selectedWrapper.getWorldPosition(worldPos);
        anchorMarker.position.copy(worldPos);
        anchorMarker.visible = true;
    }

    function toggleEditMode() {
        editModeEnabled = !editModeEnabled;
        if (!editModeEnabled) {
            setSelectedWrapper(null);
        }
        if (editPanel) {
            editPanel.classList.toggle('hidden', !editModeEnabled);
        }
        updateAnchorMarker();
        console.info(`[urdf-edit] mode ${editModeEnabled ? 'on' : 'off'}`);
    }

    function getRootWrapper(object3d) {
        let current = object3d;
        while (current && current.parent) {
            if (current.parent === robotRoot) {
                return current;
            }
            current = current.parent;
        }
        return null;
    }

    function applyPivotDelta(wrapper, deltaX, deltaY, deltaZ) {
        if (!wrapper || !wrapper.children || wrapper.children.length === 0) {
            return;
        }
        const content = wrapper.children[0];
        const worldBefore = new THREE.Vector3();
        content.getWorldPosition(worldBefore);

        content.position.sub(new THREE.Vector3(deltaX, deltaY, deltaZ));

        const worldAfter = new THREE.Vector3();
        content.getWorldPosition(worldAfter);
        const compensation = worldBefore.sub(worldAfter);
        wrapper.position.add(compensation);

        const pivot = Array.isArray(wrapper.userData.pivotOffset)
            ? wrapper.userData.pivotOffset
            : [0, 0, 0];
        pivot[0] = (Number(pivot[0]) || 0) + deltaX;
        pivot[1] = (Number(pivot[1]) || 0) + deltaY;
        pivot[2] = (Number(pivot[2]) || 0) + deltaZ;
        wrapper.userData.pivotOffset = pivot;
    }

    function collectPivotOffsets() {
        const offsets = {};
        robotRoot.children.forEach((child) => {
            if (!child?.name) {
                return;
            }
            const pivot = Array.isArray(child.userData?.pivotOffset)
                ? child.userData.pivotOffset
                : [0, 0, 0];
            offsets[child.name] = [
                Number(pivot[0]) || 0,
                Number(pivot[1]) || 0,
                Number(pivot[2]) || 0,
            ];
        });
        return offsets;
    }

    function round3(value) {
        return Math.round((Number(value) || 0) * 1000) / 1000;
    }

    function getWrapperState(wrapper) {
        const pivot = Array.isArray(wrapper.userData?.pivotOffset)
            ? wrapper.userData.pivotOffset
            : [0, 0, 0];

        return {
            name: wrapper.name,
            position: [
                round3(wrapper.position.x),
                round3(wrapper.position.y),
                round3(wrapper.position.z),
            ],
            rotation: [
                round3(wrapper.rotation.x),
                round3(wrapper.rotation.y),
                round3(wrapper.rotation.z),
            ],
            pivot: [
                round3(pivot[0]),
                round3(pivot[1]),
                round3(pivot[2]),
            ],
        };
    }

    function getSceneTransforms() {
        return robotRoot.children
            .filter((child) => !!child?.name)
            .map((child) => getWrapperState(child));
    }

    function logWrapperState(reason, wrapper) {
        if (!wrapper) {
            console.info(`[urdf-edit] ${reason}: no selection`);
            return;
        }
        console.info(`[urdf-edit] ${reason} ${JSON.stringify(getWrapperState(wrapper))}`);
    }

    function logSceneState(reason) {
        console.info(`[urdf-edit] ${reason} ${JSON.stringify(getSceneTransforms())}`);
    }

    function savePivotOffsets() {
        const offsets = collectPivotOffsets();
        pivotOffsets = offsets;
        try {
            localStorage.setItem(PIVOT_STORAGE_KEY, JSON.stringify(offsets));
            console.info('ThreejsViewer: pivot offsets saved', offsets);
            return true;
        } catch (error) {
            console.error('ThreejsViewer: failed to save pivot offsets', error);
            return false;
        }
    }

    function loadPivotOffsets() {
        try {
            const raw = localStorage.getItem(PIVOT_STORAGE_KEY);
            if (!raw) {
                pivotOffsets = {};
                return;
            }
            const parsed = JSON.parse(raw);
            pivotOffsets = parsed && typeof parsed === 'object' ? parsed : {};
        } catch {
            pivotOffsets = {};
        }
    }

    function attachLoadedObject(name, content, options = {}) {
        removeObjectByName(name);
        restyleObject(content, options);

        const wrapper = new THREE.Group();
        wrapper.name = name;
        wrapper.add(content);
        normalizeObject(wrapper, content, options);

        const configuredPivot = Array.isArray(options.pivotOffset) ? options.pivotOffset : null;
        const persistedPivot = Array.isArray(pivotOffsets[name]) ? pivotOffsets[name] : null;
        const pivotOffset = configuredPivot || persistedPivot;
        if (pivotOffset) {
            const worldBefore = new THREE.Vector3();
            content.getWorldPosition(worldBefore);

            content.position.sub(
                new THREE.Vector3(
                    Number(pivotOffset[0]) || 0,
                    Number(pivotOffset[1]) || 0,
                    Number(pivotOffset[2]) || 0
                )
            );

            const worldAfter = new THREE.Vector3();
            content.getWorldPosition(worldAfter);
            const compensation = worldBefore.sub(worldAfter);
            wrapper.position.add(compensation);

            wrapper.userData.pivotOffset = [
                Number(pivotOffset[0]) || 0,
                Number(pivotOffset[1]) || 0,
                Number(pivotOffset[2]) || 0,
            ];
        } else {
            wrapper.userData.pivotOffset = [0, 0, 0];
        }

        const rotationUnit = options.rotation_unit ?? 'degrees';
        applyTransform(wrapper, options, rotationUnit);
        robotRoot.add(wrapper);
    }

    function normalizeLegendColor(color) {
        if (typeof color === 'number') {
            return `#${color.toString(16).padStart(6, '0')}`;
        }
        if (typeof color === 'string' && color.trim()) {
            return color;
        }
        return '#4a90d9';
    }

    function setLegendItems(items = []) {
        if (!legendContainer) {
            return;
        }
        legendContainer.innerHTML = '';
        items.forEach((item) => {
            const row = document.createElement('div');
            row.className = 'legend-item';

            const swatch = document.createElement('span');
            swatch.className = 'legend-swatch';
            swatch.style.backgroundColor = normalizeLegendColor(item.color);

            const label = document.createElement('span');
            label.textContent = item.name ?? 'Unnamed';

            row.appendChild(swatch);
            row.appendChild(label);
            legendContainer.appendChild(row);
        });
    }

    function loadModel(name, url, options = {}) {
        const normalizedUrl = String(url).split('?')[0].split('#')[0].toLowerCase();

        if (normalizedUrl.endsWith('.obj')) {
            objLoader.load(
                url,
                (content) => attachLoadedObject(name, content, options),
                undefined,
                (error) => console.error(`Failed to load OBJ ${name}:`, error),
            );
            return;
        }

        if (normalizedUrl.endsWith('.gltf') || normalizedUrl.endsWith('.glb')) {
            gltfLoader.load(
                url,
                (gltf) => attachLoadedObject(name, gltf.scene, options),
                undefined,
                (error) => console.error(`Failed to load GLTF ${name}:`, error),
            );
            return;
        }

        if (normalizedUrl.endsWith('.stl')) {
            stlLoader.load(
                url,
                (geometry) => {
                    const mesh = new THREE.Mesh(geometry, makeMaterial(options));
                    attachLoadedObject(name, mesh, options);
                },
                undefined,
                (error) => console.error(`Failed to load STL ${name}:`, error),
            );
            return;
        }

        console.error(`Unsupported model format for ${name}: ${url}`);
    }

    // Grid helper
    const grid = new THREE.GridHelper(10, 10, 0x444466, 0x333355);
    scene.add(grid);

    // Axes helper
    const axes = new THREE.AxesHelper(2);
    scene.add(axes);

    // Resize handling
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
        renderer.domElement.focus();
        if (!editModeEnabled) {
            return;
        }

        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);

        const intersects = raycaster.intersectObjects(robotRoot.children, true);
        if (!intersects.length) {
            setSelectedWrapper(null);
            return;
        }
        const wrapper = getRootWrapper(intersects[0].object);
        setSelectedWrapper(wrapper);
        logWrapperState('select', wrapper);
    });

    window.addEventListener('keydown', (event) => {
        if (event.key && event.key.toLowerCase() === 'e') {
            toggleEditMode();
            event.preventDefault();
            return;
        }

        if (!editModeEnabled || !selectedWrapper) {
            return;
        }

        const step = event.shiftKey ? 0.005 : 0.02;
        const key = event.key ? event.key.toLowerCase() : '';
        let handled = true;

        if (key === 'j') {
            applyPivotDelta(selectedWrapper, -step, 0, 0);
        } else if (key === 'l') {
            applyPivotDelta(selectedWrapper, step, 0, 0);
        } else if (key === 'u') {
            applyPivotDelta(selectedWrapper, 0, -step, 0);
        } else if (key === 'o') {
            applyPivotDelta(selectedWrapper, 0, step, 0);
        } else if (key === 'i') {
            applyPivotDelta(selectedWrapper, 0, 0, -step);
        } else if (key === 'k') {
            applyPivotDelta(selectedWrapper, 0, 0, step);
        } else {
            handled = false;
        }

        if (handled) {
            logWrapperState('adjust', selectedWrapper);
            event.preventDefault();
        }
    });

    // Animation loop
    function animate() {
        requestAnimationFrame(animate);
        updateAnchorMarker();
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // Expose API for Python calls via runJavaScript
    loadPivotOffsets();

    window.clearScene = function() {
        [...robotRoot.children].forEach((child) => {
            robotRoot.remove(child);
            disposeObject(child);
        });
    };

    window.addBox = function(x, y, z, w, h, d, color) {
        const geo = new THREE.BoxGeometry(w || 1, h || 1, d || 1);
        const mat = new THREE.MeshStandardMaterial({ color: color || 0x4a90d9 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x || 0, y || 0, z || 0);
        robotRoot.add(mesh);
    };

    window.loadModel = function(name, url, options = {}) {
        loadModel(name, url, options);
    };

    window.setLegendItems = function(items = []) {
        setLegendItems(items);
    };

    window.setObjectTransform = function(name, transform = {}, rotationUnit = 'degrees') {
        const object3d = robotRoot.getObjectByName(name);
        if (!object3d) {
            console.warn(`Unknown object: ${name}`);
            return false;
        }
        applyTransform(object3d, {
            position: transform.position ?? [object3d.position.x, object3d.position.y, object3d.position.z],
            rotation: transform.rotation ?? [object3d.rotation.x, object3d.rotation.y, object3d.rotation.z],
            scale: transform.scale ?? [object3d.scale.x, object3d.scale.y, object3d.scale.z],
        }, rotationUnit);
        return true;
    };

    window.removeObject = function(name) {
        removeObjectByName(name);
    };

    window.nudgeOrbit = function(dx, dy) {
        const azimuth = Number(dx) || 0;
        const polar = Number(dy) || 0;
        if (azimuth !== 0) {
            controls.rotateLeft(azimuth);
        }
        if (polar !== 0) {
            controls.rotateUp(polar);
        }
        controls.update();
    };

    window.getPivotOffsets = function() {
        return collectPivotOffsets();
    };

    window.getSceneTransforms = function() {
        return getSceneTransforms();
    };

    window.savePivotOffsets = function() {
        return savePivotOffsets();
    };

    if (savePivotButton) {
        savePivotButton.addEventListener('click', () => {
            savePivotOffsets();
            logSceneState('save');
        });
    }

    window.loadGLTF = function(url) {
        loadModel('gltf-model', url, {});
    };

    window.loadSTL = function(url, color) {
        loadModel('stl-model', url, { color: color || 0x4a90d9 });
    };
</script>
</body>
</html>
